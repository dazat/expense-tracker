<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Expense Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefec;
    --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09b;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
    --info:#185fa5;--info-bg:#e6f1fb;--info-text:#0c447c;
    --danger:#a32d2d;--danger-bg:#fcebeb;--danger-border:rgba(163,45,45,0.3);
    --success:#0f6e56;
    --radius:8px;--radius-lg:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#333330;
      --text:#f0efe8;--text2:#a0a09b;--text3:#6b6b67;
      --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
      --info:#85b7eb;--info-bg:rgba(55,138,221,0.15);--info-text:#b5d4f4;
      --danger:#f09595;--danger-bg:rgba(163,45,45,0.2);--danger-border:rgba(240,149,149,0.3);
      --success:#5dcaa5;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:0 0 3rem}
  .app{width:100%;max-width:480px;background:var(--bg);min-height:100vh}
  .header{padding:1.25rem 1rem 0.75rem;display:flex;justify-content:space-between;align-items:baseline;border-bottom:0.5px solid var(--border)}
  .header-month{font-size:15px;font-weight:500}
  .header-total{font-size:24px;font-weight:500}
  .tab-nav{display:flex;border-bottom:0.5px solid var(--border)}
  .tab-btn{flex:1;padding:12px 6px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;transition:color 0.15s}
  .tab-btn.on{color:var(--info);border-bottom-color:var(--info);font-weight:500}
  .section{display:none;padding:1rem 1rem 2rem}
  .section.on{display:block}
  .amount-row{display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;border-bottom:1.5px solid var(--border2);padding-bottom:6px}
  .amount-symbol{font-size:22px;color:var(--text2)}
  #amt{flex:1;font-size:32px;font-weight:500;border:none;background:transparent;color:var(--text);outline:none;font-family:inherit}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
  .chip{padding:9px 16px;border-radius:20px;border:0.5px solid var(--border2);background:none;cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;transition:all 0.1s}
  .chip.on{background:var(--info-bg);color:var(--info-text);border-color:transparent;font-weight:500}
  .btn{width:100%;padding:14px;font-size:15px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;color:var(--text);cursor:pointer;font-family:inherit;transition:background 0.1s}
  .btn:hover{background:var(--bg2)}
  .btn:active{transform:scale(0.99)}
  .btn-danger{color:var(--danger);border-color:var(--danger-border)}
  .btn-sm{padding:10px 16px;font-size:14px;width:auto}
  .msg{text-align:center;font-size:13px;margin-top:8px;min-height:18px}
  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:1rem}
  .metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
  .metric-val{font-size:22px;font-weight:500}
  .section-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px}
  .bar-row{margin-bottom:14px}
  .bar-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:14px}
  .bar-track{height:6px;border-radius:3px;background:var(--border)}
  .bar-fill{height:6px;border-radius:3px}
  .divider{border-top:0.5px solid var(--border);padding-top:1rem;margin-top:1.5rem}
  .hist-row{display:flex;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);gap:10px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .hist-cat{font-size:14px;font-weight:500}
  .hist-date{font-size:12px;color:var(--text2)}
  .hist-amt{font-size:15px;font-weight:500;margin-left:auto}
  .del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px 6px;line-height:1;font-family:inherit}
  .del:hover{color:var(--danger)}
  .cat-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border)}
  .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .cat-input{flex:1;font-size:14px;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none}
  .add-row{display:flex;gap:8px;margin-top:1rem}
  .add-row input{flex:1;padding:10px 12px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text);font-family:inherit;outline:none}
  .add-row input:focus{border-color:var(--info)}
  .empty{color:var(--text3);font-size:14px;padding:1rem 0}
  @media(max-width:480px){.app{min-height:100svh}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-month" id="mlabel"></span>
    <span class="header-total" id="mhead">$0.00</span>
  </div>

  <div class="tab-nav">
    <button class="tab-btn on" id="n-log" onclick="go('log')">+ Log</button>
    <button class="tab-btn" id="n-sum" onclick="go('sum')">Summary</button>
    <button class="tab-btn" id="n-hist" onclick="go('hist')">History</button>
    <button class="tab-btn" id="n-cats" onclick="go('cats')">Categories</button>
  </div>

  <!-- LOG -->
  <div id="s-log" class="section on">
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Log a purchase</p>
    <div class="amount-row">
      <span class="amount-symbol">$</span>
      <input type="number" id="amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"/>
    </div>
    <div class="chips" id="chips"></div>
    <button class="btn" onclick="addEntry()">Add purchase</button>
    <p class="msg" id="msg"></p>
  </div>

  <!-- SUMMARY -->
  <div id="s-sum" class="section">
    <div class="metric-grid">
      <div class="metric"><p class="metric-label">Total spent</p><p class="metric-val" id="st"></p></div>
      <div class="metric"><p class="metric-label">Purchases</p><p class="metric-val" id="sc"></p></div>
    </div>
    <p class="section-label">By category</p>
    <div id="bd"></div>
    <div class="divider">
      <p style="font-size:13px;color:var(--text2);margin-bottom:10px">Export &amp; reset</p>
      <button class="btn" style="margin-bottom:8px" onclick="exportCSV()">Download CSV</button>
      <button class="btn btn-danger" onclick="resetMonth()">Clear month &amp; start fresh</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="s-hist" class="section">
    <div id="hl"></div>
  </div>

  <!-- CATEGORIES -->
  <div id="s-cats" class="section">
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Add, rename, or remove categories</p>
    <div id="catlist"></div>
    <div class="add-row">
      <input id="newcat" placeholder="New category name" onkeydown="if(event.key==='Enter')addCat()"/>
      <button class="btn btn-sm" onclick="addCat()">Add</button>
    </div>
    <p class="msg" id="cmsg"></p>
  </div>
</div>

<script>
const PALETTE=['#378ADD','#BA7517','#3B6D11','#7F77DD','#D4537E','#1D9E75','#888780','#D85A30','#A32D2D','#0F6E56','#533AB7','#639922'];
const DEFAULT_CATS=['Food','Gas','Groceries','Shopping','Entertainment','Health','Other'];
let entries=[], cats=[], sel='';

function mkey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mlabel(){return new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});}
function catColor(c){const i=cats.indexOf(c);return PALETTE[i<0?0:i%PALETTE.length];}

function load(){
  try{entries=JSON.parse(localStorage.getItem('exp:'+mkey()))||[];}catch{entries=[];}
  try{cats=JSON.parse(localStorage.getItem('exp:cats'))||DEFAULT_CATS;}catch{cats=[...DEFAULT_CATS];}
  head();renderChips();
}

function saveEntries(){localStorage.setItem('exp:'+mkey(),JSON.stringify(entries));}
function saveCats(){localStorage.setItem('exp:cats',JSON.stringify(cats));}

function head(){
  document.getElementById('mlabel').textContent=mlabel();
  const t=entries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('mhead').textContent='$'+t.toFixed(2);
}

function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+(c===sel?' on':'');
    b.textContent=c;
    b.onclick=()=>{sel=c;renderChips();};
    el.appendChild(b);
  });
}

function addEntry(){
  const v=parseFloat(document.getElementById('amt').value);
  if(!v||v<=0){flash('Enter an amount',1);return;}
  if(!sel){flash('Pick a category',1);return;}
  entries.push({id:Date.now(),amount:v,category:sel,date:new Date().toISOString()});
  saveEntries();
  document.getElementById('amt').value='';
  sel='';renderChips();head();flash('Added!');
}

function flash(m,e){
  const el=document.getElementById('msg');
  el.textContent=m;el.style.color=e?'var(--danger)':'var(--success)';
  setTimeout(()=>el.textContent='',2000);
}

function go(t){
  ['log','sum','hist','cats'].forEach(x=>{
    document.getElementById('s-'+x).className='section'+(x===t?' on':'');
    document.getElementById('n-'+x).className='tab-btn'+(x===t?' on':'');
  });
  if(t==='sum')rSum();
  if(t==='hist')rHist();
  if(t==='cats')rCats();
}

function rSum(){
  const t=entries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('st').textContent='$'+t.toFixed(2);
  document.getElementById('sc').textContent=entries.length;
  const by={};entries.forEach(e=>by[e.category]=(by[e.category]||0)+e.amount);
  const bd=document.getElementById('bd');
  if(!Object.keys(by).length){bd.innerHTML='<p class="empty">No entries yet</p>';return;}
  const mx=Math.max(...Object.values(by));
  bd.innerHTML=Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
    const pct=t>0?Math.round(amt/t*100):0;
    const w=Math.round(amt/mx*100);
    return`<div class="bar-row"><div class="bar-head"><span>${cat}</span><span style="font-weight:500">${'$'+amt.toFixed(2)} <span style="font-size:12px;color:var(--text2)">(${pct}%)</span></span></div><div class="bar-track"><div class="bar-fill" style="background:${catColor(cat)};width:${w}%"></div></div></div>`;
  }).join('');
}

function rHist(){
  const hl=document.getElementById('hl');
  if(!entries.length){hl.innerHTML='<p class="empty">No entries yet</p>';return;}
  hl.innerHTML=[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>{
    const d=new Date(e.date);
    const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return`<div class="hist-row"><div class="dot" style="background:${catColor(e.category)}"></div><div><p class="hist-cat">${e.category}</p><p class="hist-date">${ds}</p></div><span class="hist-amt">$${e.amount.toFixed(2)}</span><button class="del" onclick="delEntry(${e.id})">×</button></div>`;
  }).join('');
}

function rCats(){
  const el=document.getElementById('catlist');
  if(!cats.length){el.innerHTML='<p class="empty">No categories yet</p>';return;}
  el.innerHTML=cats.map((c,i)=>`
    <div class="cat-row">
      <div class="cat-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>
      <input class="cat-input" value="${c}" onblur="renameCat(${i},this.value)" onkeydown="if(event.key==='Enter')this.blur()"/>
      <button class="del" onclick="removeCat(${i})">×</button>
    </div>`).join('');
}

function addCat(){
  const inp=document.getElementById('newcat');
  const v=inp.value.trim();
  if(!v){cflash('Enter a name',1);return;}
  if(cats.map(x=>x.toLowerCase()).includes(v.toLowerCase())){cflash('Already exists',1);return;}
  cats.push(v);saveCats();inp.value='';rCats();renderChips();cflash('Category added!');
}

function renameCat(i,v){
  v=v.trim();
  if(!v||v===cats[i])return;
  const old=cats[i];cats[i]=v;
  entries.forEach(e=>{if(e.category===old)e.category=v;});
  saveCats();saveEntries();rCats();renderChips();
}

function removeCat(i){
  if(entries.some(e=>e.category===cats[i])){cflash('Used in entries — rename instead',1);return;}
  cats.splice(i,1);saveCats();rCats();renderChips();
}

function cflash(m,e){
  const el=document.getElementById('cmsg');
  el.textContent=m;el.style.color=e?'var(--danger)':'var(--success)';
  setTimeout(()=>el.textContent='',2500);
}

function delEntry(id){
  entries=entries.filter(e=>e.id!==id);saveEntries();head();rHist();
}

function exportCSV(){
  if(!entries.length){alert('No entries to export.');return;}
  const rows=[['Date','Category','Amount'],...[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>[new Date(e.date).toLocaleDateString('en-US'),e.category,e.amount.toFixed(2)])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='expenses-'+mkey()+'.csv';
  a.click();
}

function resetMonth(){
  if(!confirm('This will permanently clear this month\'s entries. Export first if needed.'))return;
  entries=[];saveEntries();head();rSum();
}

load();
</script>
</body>
</html>
